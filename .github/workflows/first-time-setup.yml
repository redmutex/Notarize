name: First-time server setup

on:
  workflow_dispatch:

jobs:
  setup:
    name: Server Setup
    runs-on: ubuntu-latest
    environment: notarize

    steps:
      - name: Run server setup (dj → sudo)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.SSH_HOST }}
          username: dj
          password: ${{ secrets.DJ_PASSWORD }}
          envs: NOTARIZE_DB_PASS,NOTARIZE_MYSQL_ROOT
          script: |
            set -euo pipefail

            # Unlock sudo for this session
            echo '${{ secrets.DJ_PASSWORD }}' | sudo -S -v

            APP_DIR=/var/www/notarize
            KEY_DIR=/etc/notarize/keys
            DOMAIN=notarize.onrite.cloud
            VHOST=/etc/nginx/sites-available/$DOMAIN.conf

            # ── [1/6] Directories ──────────────────────────────────
            sudo mkdir -p "$APP_DIR/uploads" "$APP_DIR/public" "$KEY_DIR"
            sudo chown -R robot:www-data "$APP_DIR" 2>/dev/null || sudo chown -R robot "$APP_DIR"
            sudo chmod -R 755 "$APP_DIR"
            sudo chmod -R 775 "$APP_DIR/uploads"
            echo "[1/6] Directories OK"

            # ── [2/6] RSA signing keys ─────────────────────────────
            if [ ! -f "$KEY_DIR/private.pem" ]; then
              sudo openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:4096 \
                -out "$KEY_DIR/private.pem"
              sudo openssl rsa -pubout -in "$KEY_DIR/private.pem" \
                -out "$KEY_DIR/public.pem"
              sudo chmod 640 "$KEY_DIR/private.pem"
              sudo chmod 644 "$KEY_DIR/public.pem"
              sudo chown www-data:www-data "$KEY_DIR/private.pem" "$KEY_DIR/public.pem"
              echo "[2/6] RSA-4096 keys generated"
            else
              echo "[2/6] RSA keys already exist"
            fi

            # ── [3/6] MySQL ────────────────────────────────────────
            sudo MYSQL_PWD="$NOTARIZE_MYSQL_ROOT" mysql -u root \
              -e "CREATE DATABASE IF NOT EXISTS notarize_app CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
            sudo MYSQL_PWD="$NOTARIZE_MYSQL_ROOT" mysql -u root \
              -e "CREATE USER IF NOT EXISTS 'notarize_app'@'localhost' IDENTIFIED BY '$NOTARIZE_DB_PASS';"
            sudo MYSQL_PWD="$NOTARIZE_MYSQL_ROOT" mysql -u root \
              -e "GRANT ALL PRIVILEGES ON notarize_app.* TO 'notarize_app'@'localhost'; FLUSH PRIVILEGES;"
            echo "[3/6] MySQL DB and user ready"

            # ── [4/6] nginx HTTP-only vhost (for ACME challenge) ───
            printf 'server {\n    listen 80;\n    listen [::]:80;\n    server_name %s;\n    root /var/www/notarize/public;\n    location /.well-known/acme-challenge/ { try_files $uri =404; }\n    location / { return 444; }\n}\n' "$DOMAIN" | sudo tee "$VHOST" > /dev/null
            sudo ln -sf "$VHOST" /etc/nginx/sites-enabled/$DOMAIN.conf
            sudo nginx -t && sudo systemctl reload nginx
            echo "[4/6] nginx HTTP vhost enabled"

            # ── [5/6] SSL certificate ──────────────────────────────
            sudo certbot certonly --webroot -w "$APP_DIR/public" -d "$DOMAIN" \
              --non-interactive --agree-tos -m danial@redmutex.com
            echo "[5/6] SSL certificate issued"

            # Write the full HTTPS nginx vhost now that cert exists
            printf 'server {\n    listen 80;\n    listen [::]:80;\n    server_name %s;\n    return 301 https://$host$request_uri;\n}\nserver {\n    listen 443 ssl;\n    listen [::]:443 ssl;\n    server_name %s;\n    root /var/www/notarize/public;\n    index index.php;\n    ssl_certificate /etc/letsencrypt/live/%s/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/%s/privkey.pem;\n    include /etc/letsencrypt/options-ssl-nginx.conf;\n    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;\n    client_max_body_size 12M;\n    location / { try_files $uri $uri/ =404; }\n    location ~ \\.php$ {\n        fastcgi_pass unix:/run/php/php8.3-fpm.sock;\n        fastcgi_index index.php;\n        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;\n        include fastcgi_params;\n    }\n    location ~ /\\.(env|git) { deny all; return 404; }\n}\n' \
              "$DOMAIN" "$DOMAIN" "$DOMAIN" "$DOMAIN" | sudo tee "$VHOST" > /dev/null
            sudo nginx -t && sudo systemctl reload nginx
            echo "[5b] HTTPS nginx vhost enabled"

            # ── [6/6] robot group + permissions ───────────────────
            sudo usermod -aG www-data robot 2>/dev/null || true
            sudo chown -R robot:www-data "$APP_DIR"
            sudo chmod -R g+w "$APP_DIR"
            echo "[6/6] Permissions set for robot deploy user"

            echo ""
            echo "=== Server setup complete. Run the Deploy workflow next. ==="
        env:
          NOTARIZE_DB_PASS: ${{ secrets.DB_PASSWORD }}
          NOTARIZE_MYSQL_ROOT: ${{ secrets.MYSQL_ROOT_PASSWORD }}
